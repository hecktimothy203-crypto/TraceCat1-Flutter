name: Export TraceCat Source for Repair

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/inspect-image-import.yml

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract TraceCat source
        run: |
          rm -rf build-source
          mkdir -p build-source
          unzip -q TraceCat-Flutter-1.0-source.zip -d build-source

      - name: Prepare repair files
        run: |
          mkdir -p repair-files
          cp build-source/tracecat_flutter/lib/main.dart repair-files/main.dart
          cp build-source/tracecat_flutter/pubspec.yaml repair-files/pubspec.yaml
          cp build-source/tracecat_flutter/android/app/src/main/AndroidManifest.xml repair-files/AndroidManifest.xml

      - name: Upload repair files
        uses: actions/upload-artifact@v4
        with:
          name: TraceCat-Repair-Files
          path: repair-files
          retention-days: 7
