name: Inspect TraceCat Image Import

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/inspect-image-import.yml

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract TraceCat source
        run: |
          rm -rf build-source
          mkdir -p build-source
          unzip -q TraceCat-Flutter-1.0-source.zip -d build-source
          test -f build-source/tracecat_flutter/lib/main.dart

      - name: Show image import code
        working-directory: build-source/tracecat_flutter
        run: |
          python3 - <<'PY'
          from pathlib import Path

          terms = (
              "ImagePicker",
              "pickImage",
              "ImageSource",
              "XFile",
              "Import Image",
              "Take Photo",
              "readAsBytes",
              "File(",
              "Navigator.pop",
              "Navigator.push",
              "imagePath",
              "imageBytes",
              "selectedImage",
              "pickedImage",
          )

          for path in sorted(Path("lib").rglob("*.dart")):
              lines = path.read_text(
                  encoding="utf-8",
                  errors="replace",
              ).splitlines()

              ranges = []

              for index, line in enumerate(lines):
                  if any(
                      term.lower() in line.lower()
                      for term in terms
                  ):
                      start = max(0, index - 20)
                      end = min(len(lines), index + 31)
                      ranges.append((start, end))

              if not ranges:
                  continue

              ranges.sort()
              merged = []

              for start, end in ranges:
                  if merged and start <= merged[-1][1]:
                      merged[-1] = (
                          merged[-1][0],
                          max(merged[-1][1], end),
                      )
                  else:
                      merged.append((start, end))

              print()
              print("=" * 80)
              print(path)
              print("=" * 80)

              for start, end in merged:
                  for number in range(start, end):
                      print(
                          f"{number + 1:5}: {lines[number]}"
                      )
                  print("-" * 80)

          print()
          print("=" * 80)
          print("PUBSPEC")
          print("=" * 80)
          print(
              Path("pubspec.yaml").read_text(
                  encoding="utf-8",
                  errors="replace",
              )
          )

          manifest = Path(
              "android/app/src/main/AndroidManifest.xml"
          )

          if manifest.exists():
              print()
              print("=" * 80)
              print("ANDROID MANIFEST")
              print("=" * 80)
              print(
                  manifest.read_text(
                      encoding="utf-8",
                      errors="replace",
                  )
              )
          PY
