name: Build TraceCat Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - TraceCat-Flutter-1.0-source.zip
      - .github/workflows/build-apk.yml

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Extract TraceCat source
        run: |
          rm -rf build-source
          mkdir -p build-source
          unzip -q TraceCat-Flutter-1.0-source.zip -d build-source
          test -f build-source/tracecat_flutter/pubspec.yaml

      - name: Generate Android build files
        working-directory: build-source/tracecat_flutter
        run: |
          cp -R android /tmp/tracecat-android-custom

          flutter create \
            --platforms=android \
            --org com.tracecat \
            --project-name tracecat_flutter \
            .

          cp /tmp/tracecat-android-custom/app/build.gradle.kts \
            android/app/build.gradle.kts

          cp /tmp/tracecat-android-custom/app/src/main/AndroidManifest.xml \
            android/app/src/main/AndroidManifest.xml

          rm -rf android/app/src/main/kotlin

          cp -R \
            /tmp/tracecat-android-custom/app/src/main/kotlin \
            android/app/src/main/

          cp -R \
            /tmp/tracecat-android-custom/app/src/main/res/. \
            android/app/src/main/res/

          rm -f test/widget_test.dart

          find android -maxdepth 2 -type f \
            \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) \
            -exec sed -i \
            's/8\.7\.3/8.9.1/g; s/2\.1\.0/2.2.20/g' {} +

          sed -i -E \
            's/gradle-[0-9.]+-(all|bin)\.zip/gradle-8.11.1-all.zip/' \
            android/gradle/wrapper/gradle-wrapper.properties

      - name: Add missing TraceView constructor
        working-directory: build-source/tracecat_flutter
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("lib/main.dart")
          text = path.read_text(encoding="utf-8")

          fixed = """class TraceView {
            TraceView();

          """

          if fixed not in text:
              marker = "class TraceView {\n"

              if marker not in text:
                  raise RuntimeError(
                      "Could not locate the TraceView class."
                  )

              text = text.replace(
                  marker,
                  fixed,
                  1,
              )

              path.write_text(
                  text,
                  encoding="utf-8",
              )

          print("TraceView default constructor is present.")
          PY

      - name: Download Flutter packages
        working-directory: build-source/tracecat_flutter
        run: flutter pub get

      - name: Check Dart compilation
        working-directory: build-source/tracecat_flutter
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        continue-on-error: true
        working-directory: build-source/tracecat_flutter
        run: flutter test

      - name: Build installable debug APK
        working-directory: build-source/tracecat_flutter
        run: flutter build apk --debug

      - name: Prepare APK artifact
        run: |
          cp \
            build-source/tracecat_flutter/build/app/outputs/flutter-apk/app-debug.apk \
            TraceCat-Flutter-1.0.apk

          sha256sum TraceCat-Flutter-1.0.apk \
            > TraceCat-Flutter-1.0.sha256

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TraceCat-Android-APK
          path: |
            TraceCat-Flutter-1.0.apk
            TraceCat-Flutter-1.0.sha256
          if-no-files-found: error
          retention-days: 30
